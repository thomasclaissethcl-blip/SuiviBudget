<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Suivi de budget</title>
  <meta name="theme-color" content="#1f6feb">
  <meta name="description" content="Application simple de suivi du budget restant.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #17202a;
      --muted: #6b7280;
      --border: #d9dee7;
      --primary: #1f6feb;
      --danger: #c62828;
      --success: #16794c;
      --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    main {
      width: min(860px, calc(100% - 24px));
      margin: 24px auto;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .app {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .remaining {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .remaining-label {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 6px;
    }

    .remaining-value {
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      font-weight: 800;
      line-height: 1;
    }

    .negative {
      color: var(--danger);
    }

    .positive {
      color: var(--success);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      cursor: pointer;
      background: var(--primary);
      color: white;
      font-weight: 650;
      touch-action: manipulation;
    }

    button.secondary {
      background: #e8eef8;
      color: #16325c;
    }

    button.danger {
      background: var(--danger);
    }

    button.icon {
      width: 42px;
      height: 42px;
      padding: 0;
      display: grid;
      place-items: center;
      border-radius: 50%;
    }

    button.small {
      padding: 8px 10px;
      font-size: 0.9rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .form {
      display: none;
      grid-template-columns: 1fr 150px auto;
      gap: 10px;
      align-items: end;
      margin-top: 14px;
    }

    .form.visible {
      display: grid;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 12px;
      background: white;
      color: var(--text);
    }

    .tools {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 10px;
      margin-top: 12px;
    }

    .list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .expense {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      background: #fbfcfe;
    }

    .expense-name {
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .expense-amount {
      font-weight: 800;
      white-space: nowrap;
    }

    .expense-actions {
      display: flex;
      gap: 8px;
    }

    .empty {
      color: var(--muted);
      text-align: center;
      padding: 18px;
      border: 1px dashed var(--border);
      border-radius: 14px;
      background: #fbfcfe;
    }

    .storage-note {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.45;
    }

    dialog {
      border: 0;
      border-radius: var(--radius);
      width: min(420px, calc(100% - 24px));
      box-shadow: var(--shadow);
      padding: 0;
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.35);
    }

    .dialog-content {
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    .dialog-content h2 {
      margin: 0;
      font-size: 1.3rem;
    }

    .dialog-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    @media (max-width: 680px) {
      main {
        width: min(100% - 18px, 860px);
        margin: 12px auto;
      }

      .form,
      .form.visible,
      .tools,
      .expense {
        grid-template-columns: 1fr;
      }

      .remaining {
        align-items: flex-start;
      }

      .expense-actions {
        justify-content: flex-start;
      }

      .actions button {
        flex: 1 1 auto;
      }
    }

    @media print {
      body {
        background: white;
      }

      main {
        width: 100%;
        margin: 0;
      }

      .card {
        box-shadow: none;
      }

      .actions,
      .form,
      .tools,
      .expense-actions,
      .storage-note,
      button {
        display: none !important;
      }

      .expense {
        grid-template-columns: 1fr auto;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="app">
      <section class="card remaining">
        <div>
          <div class="remaining-label">Budget restant</div>
          <div id="remaining" class="remaining-value">0 €</div>
        </div>
        <button id="editBudget" class="icon" title="Modifier le budget" aria-label="Modifier le budget">✎</button>
      </section>

      <section class="card">
        <div class="actions">
          <button id="toggleForm">Ajouter une dépense</button>
          <button id="exportPdf" class="secondary">Exporter en PDF</button>
          <button id="backupJson" class="secondary">Sauvegarder</button>
          <button id="restoreJson" class="secondary">Importer</button>
          <input id="restoreFile" type="file" accept="application/json" hidden>
        </div>

        <form id="expenseForm" class="form" autocomplete="off">
          <label>
            Nom
            <input id="expenseName" type="text" placeholder="Ex. Courses" required>
          </label>
          <label>
            Montant
            <input id="expenseAmount" type="number" min="0" step="1" placeholder="Ex. 35" required>
          </label>
          <button type="submit">Valider</button>
        </form>
      </section>

      <section class="card">
        <label>
          Rechercher
          <input id="search" type="search" placeholder="Rechercher une dépense">
        </label>

        <div class="tools">
          <label>
            Trier
            <select id="sort">
              <option value="date-desc">Plus récentes</option>
              <option value="az">A-Z</option>
              <option value="za">Z-A</option>
              <option value="amount-desc">Dépenses décroissantes</option>
              <option value="amount-asc">Dépenses croissantes</option>
            </select>
          </label>
          <label>
            Total dépensé
            <input id="spent" type="text" readonly>
          </label>
        </div>

        <div id="list" class="list"></div>
      </section>

      <section class="card storage-note">
        Les données sont enregistrées localement sur cet appareil. Cette version PWA peut être installée depuis Chrome Android avec « Ajouter à l’écran d’accueil » ou « Installer l’application ». Le bouton « Sauvegarder » permet de créer un fichier JSON de sécurité.
      </section>
    </section>
  </main>

  <dialog id="budgetDialog">
    <form method="dialog" class="dialog-content">
      <h2>Budget du mois</h2>
      <label>
        Montant alloué
        <input id="budgetInput" type="number" min="0" step="1" required>
      </label>
      <div class="dialog-actions">
        <button type="button" class="secondary" id="cancelBudget">Annuler</button>
        <button id="saveBudget">Enregistrer</button>
      </div>
    </form>
  </dialog>

  <script>
    const STORAGE_KEY = "suivi-budget-pwa-v1";

    const state = loadState();

    const remainingEl = document.getElementById("remaining");
    const spentEl = document.getElementById("spent");
    const listEl = document.getElementById("list");
    const searchEl = document.getElementById("search");
    const sortEl = document.getElementById("sort");
    const formEl = document.getElementById("expenseForm");
    const nameEl = document.getElementById("expenseName");
    const amountEl = document.getElementById("expenseAmount");
    const budgetDialog = document.getElementById("budgetDialog");
    const budgetInput = document.getElementById("budgetInput");
    const restoreFile = document.getElementById("restoreFile");

    function loadState() {
      const fallback = { budget: 0, expenses: [] };
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return fallback;
        const parsed = JSON.parse(raw);
        return {
          budget: Number.isInteger(parsed.budget) ? parsed.budget : Math.round(Number(parsed.budget)) || 0,
          expenses: Array.isArray(parsed.expenses) ? parsed.expenses : []
        };
      } catch {
        return fallback;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function euro(value) {
      return `${Math.round(value).toLocaleString("fr-FR")} €`;
    }

    function totalSpent() {
      return state.expenses.reduce((sum, item) => sum + item.amount, 0);
    }

    function render() {
      const spent = totalSpent();
      const remaining = state.budget - spent;

      remainingEl.textContent = euro(remaining);
      remainingEl.classList.toggle("negative", remaining < 0);
      remainingEl.classList.toggle("positive", remaining >= 0);
      spentEl.value = euro(spent);

      const query = searchEl.value.trim().toLowerCase();
      let items = state.expenses.filter(item => item.name.toLowerCase().includes(query));

      const sort = sortEl.value;
      items.sort((a, b) => {
        if (sort === "az") return a.name.localeCompare(b.name, "fr");
        if (sort === "za") return b.name.localeCompare(a.name, "fr");
        if (sort === "amount-desc") return b.amount - a.amount;
        if (sort === "amount-asc") return a.amount - b.amount;
        return b.createdAt - a.createdAt;
      });

      listEl.innerHTML = "";

      if (!items.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = state.expenses.length ? "Aucune dépense ne correspond à la recherche." : "Aucune dépense enregistrée.";
        listEl.appendChild(empty);
        return;
      }

      for (const item of items) {
        const row = document.createElement("article");
        row.className = "expense";

        const name = document.createElement("div");
        name.className = "expense-name";
        name.textContent = item.name;

        const amount = document.createElement("div");
        amount.className = "expense-amount";
        amount.textContent = euro(item.amount);

        const actions = document.createElement("div");
        actions.className = "expense-actions";

        const edit = document.createElement("button");
        edit.className = "small secondary";
        edit.textContent = "Modifier";
        edit.addEventListener("click", () => editExpense(item.id));

        const del = document.createElement("button");
        del.className = "small danger";
        del.textContent = "Supprimer";
        del.addEventListener("click", () => deleteExpense(item.id));

        actions.append(edit, del);
        row.append(name, amount, actions);
        listEl.appendChild(row);
      }
    }

    function openBudgetDialog() {
      budgetInput.value = state.budget;
      budgetDialog.showModal();
      budgetInput.focus();
      budgetInput.select();
    }

    function addExpense(name, amount) {
      state.expenses.push({
        id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random()),
        name,
        amount,
        createdAt: Date.now()
      });
      saveState();
      render();
    }

    function editExpense(id) {
      const item = state.expenses.find(expense => expense.id === id);
      if (!item) return;

      const newName = prompt("Nom de la dépense", item.name);
      if (newName === null) return;

      const cleanName = newName.trim();
      if (!cleanName) return;

      const newAmount = prompt("Montant de la dépense", item.amount);
      if (newAmount === null) return;

      const amount = Math.round(Number(newAmount));
      if (!Number.isFinite(amount) || amount < 0) return;

      item.name = cleanName;
      item.amount = amount;
      saveState();
      render();
    }

    function deleteExpense(id) {
      const item = state.expenses.find(expense => expense.id === id);
      if (!item) return;

      if (!confirm(`Supprimer « ${item.name} » ?`)) return;

      state.expenses = state.expenses.filter(expense => expense.id !== id);
      saveState();
      render();
    }

    function exportPdf() {
      window.print();
    }

    function backupJson() {
      const payload = {
        exportedAt: new Date().toISOString(),
        app: "suivi-budget-pwa",
        version: 1,
        data: state
      };

      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `suivi-budget-${new Date().toISOString().slice(0, 10)}.json`;
      link.click();
      URL.revokeObjectURL(url);
    }

    function restoreJson(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          const data = parsed.data || parsed;

          if (!data || !Array.isArray(data.expenses)) {
            alert("Fichier non reconnu.");
            return;
          }

          state.budget = Math.round(Number(data.budget)) || 0;
          state.expenses = data.expenses
            .filter(item => item && typeof item.name === "string")
            .map(item => ({
              id: item.id || (crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random())),
              name: item.name.trim(),
              amount: Math.round(Number(item.amount)) || 0,
              createdAt: Number(item.createdAt) || Date.now()
            }));

          saveState();
          render();
          alert("Import terminé.");
        } catch {
          alert("Import impossible. Le fichier semble invalide.");
        }
      };
      reader.readAsText(file);
    }

    document.getElementById("editBudget").addEventListener("click", openBudgetDialog);

    document.getElementById("toggleForm").addEventListener("click", () => {
      formEl.classList.toggle("visible");
      if (formEl.classList.contains("visible")) nameEl.focus();
    });

    formEl.addEventListener("submit", event => {
      event.preventDefault();
      const name = nameEl.value.trim();
      const amount = Math.round(Number(amountEl.value));

      if (!name || !Number.isFinite(amount) || amount < 0) return;

      addExpense(name, amount);
      formEl.reset();
      nameEl.focus();
    });

    document.getElementById("saveBudget").addEventListener("click", event => {
      event.preventDefault();
      const value = Math.round(Number(budgetInput.value));
      if (!Number.isFinite(value) || value < 0) return;

      state.budget = value;
      saveState();
      budgetDialog.close();
      render();
    });

    document.getElementById("cancelBudget").addEventListener("click", () => budgetDialog.close());
    document.getElementById("exportPdf").addEventListener("click", exportPdf);
    document.getElementById("backupJson").addEventListener("click", backupJson);
    document.getElementById("restoreJson").addEventListener("click", () => restoreFile.click());
    restoreFile.addEventListener("change", () => {
      const file = restoreFile.files[0];
      if (file) restoreJson(file);
      restoreFile.value = "";
    });

    searchEl.addEventListener("input", render);
    sortEl.addEventListener("change", render);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js");
      });
    }

    render();

    if (!state.budget && !state.expenses.length) {
      setTimeout(openBudgetDialog, 200);
    }
  </script>
</body>
</html>
